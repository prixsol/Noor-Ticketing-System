}

function mkAssets(){

    {empId:'EMP-102',empName:'Sara Hassan'},

    {empId:'EMP-401',empName:'Khalid Saeed'},
    {empId:'EMP-501',empName:'Layla Nasser'},

  BRANCHES.forEach((b,bi)=>{
    ASSET_TYPES.slice(0,8).forEach((t,ai)=>{

      out.push({
        id:`A-${b.code}-${ai}`, tag:`${b.code}-${t.slice(0,3).toUpperCase()}-${String(bi*8+ai+1).padStart(3,'0')}`,
        name:`${t} #${bi*8+ai+1}`, type:t, branch:b.id, branchName:b.name,

        serial:`SN${Math.random().toString(36).slice(2,9).toUpperCase()}`,
        status:st[(bi+ai)%4], purchaseDate:'2023-06-01', warrantyExpiry:'2026-06-01', notes:''
      });
    });
  });
  return out;
}

    {type==='p'&&<span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`}/>}

const Av=({s,size='sm',color='gold'})=>{
  const sz={xs:'w-6 h-6 text-xs',sm:'w-8 h-8 text-xs',md:'w-10 h-10 text-sm',lg:'w-12 h-12 text-sm'};

const Btn=({children,onClick,variant='primary',size='md',icon:I2,disabled,loading,type='button',fullWidth})=>{

const TicketList=({tickets,setPage,setSelT,currentUser})=>{
  const [search,setSearch]=useState('');const [fSt,setFSt]=useState('');const [fPr,setFPr]=useState('');const [fBr,setFBr]=useState('');
  const isUser=currentUser.role==='End-User';
  const filtered=tickets.filter(t=>{
    if(isUser&&t.createdBy!==currentUser.id)return false;
    if(search&&!t.title.toLowerCase().includes(search.toLowerCase())&&!t.id.includes(search.toUpperCase()))return false;
    if(fSt&&t.status!==fSt)return false;if(fPr&&t.priority!==fPr)return false;if(fBr&&t.branch!==fBr)return false;
    return true;
  });
  return <div className="space-y-4 fade">

const CreateTicket=({currentUser,setPage,toast})=>{
  const [f,setF]=useState({branch:currentUser.branch||'',category:'',priority:'P3',title:'',description:'',assignedTo:''});
  const [saving,setSaving]=useState(false);
  const upd=k=>v=>setF(p=>({...p,[k]:v}));
  const submit=async()=>{
    if(!f.branch||!f.title.trim()||!f.description.trim()){toast('Please fill all required fields','error');return;}
    setSaving(true);await new Promise(r=>setTimeout(r,900));setSaving(false);
    toast('Ticket submitted successfully!','success');setPage(currentUser.role==='End-User'?'my_tickets':'tickets');
  };
  return <div className="max-w-2xl space-y-5 fade">

/* ══════════════════════════════════════════════

const Messages=({currentUser,toast})=>{
  const [messages,setMessages]=useState(()=>mkMessages());
  const [activeConv,setActiveConv]=useState(null);const [newMsg,setNewMsg]=useState('');const [newConvUser,setNewConvUser]=useState('');const [showNew,setShowNew]=useState(false);
  const isAdmin=currentUser.role==='Admin'||currentUser.role==='Supervisor';
  const adminId='A1';

  // Group conversations: admin sees all users, user sees only their conv with admin
  const conversations=useMemo(()=>{
    if(!isAdmin){
      const conv=messages.filter(m=>(m.fromId===currentUser.id&&m.toId===adminId)||(m.fromId===adminId&&m.toId===currentUser.id)).sort((a,b)=>new Date(a.at)-new Date(b.at));
      return [{userId:currentUser.id,userName:currentUser.name,av:currentUser.av,messages:conv,unread:conv.filter(m=>m.toId===currentUser.id&&!m.read).length}];
    }
    // Admin: group by non-admin user
    const userMap={};
    messages.forEach(m=>{
      const otherId=m.fromId===adminId?m.toId:m.fromId;
      const other=DEMO_ACCOUNTS.find(u=>u.id===otherId);
      if(!other||other.role==='Admin')return;
      if(!userMap[otherId])userMap[otherId]={userId:otherId,userName:other.name,av:other.av,messages:[],unread:0};
      userMap[otherId].messages.push(m);
      if(m.toId===adminId&&!m.read)userMap[otherId].unread++;
    });
    return Object.values(userMap).sort((a,b)=>new Date(b.messages[b.messages.length-1]?.at||0)-new Date(a.messages[a.messages.length-1]?.at||0));
  },[messages,currentUser,isAdmin]);

  const activeConvData=activeConv?conversations.find(c=>c.userId===activeConv):conversations[0]||null;
  useEffect(()=>{if(!activeConv&&conversations.length>0)setActiveConv(conversations[0].userId);},[conversations.length]);

  const send=()=>{
    if(!newMsg.trim())return;
    const otherId=isAdmin?activeConv:adminId;
    const other=DEMO_ACCOUNTS.find(u=>u.id===otherId)||{name:'Admin',av:'SA'};
    setMessages(p=>[...p,{id:`m${Date.now()}`,fromId:currentUser.id,fromName:currentUser.name,fromAv:currentUser.av,toId:otherId,body:newMsg.trim(),at:new Date().toISOString(),read:false}]);
    setNewMsg('');
    toast('Message sent','success');
  };

  const msgRef=useRef(null);
  useEffect(()=>{if(msgRef.current)msgRef.current.scrollTop=msgRef.current.scrollHeight;},[activeConvData?.messages.length]);

  const totalUnread=conversations.reduce((s,c)=>s+c.unread,0);

  return <div className="fade h-[calc(100vh-120px)] flex flex-col">
    <div className="flex items-center justify-between mb-4"><div><h1 className="text-xl font-bold text-gray-900">Messages</h1><p className="text-sm text-gray-500 mt-0.5">{isAdmin?`${conversations.length} conversations`:`Direct message with support admin`}{totalUnread>0&&<span className="ml-2 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full font-bold">{totalUnread} new</span>}</p></div>
      {isAdmin&&<Btn size="sm" icon={Ic.Plus} onClick={()=>setShowNew(true)}>New Message</Btn>}
    </div>
    <div className="flex-1 bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden flex min-h-0">
      {/* Conversation list (admin only or single for user) */}
      {isAdmin&&<div className="w-72 border-r border-gray-100 flex flex-col flex-shrink-0">
        <div className="px-4 py-3 border-b border-gray-100 bg-gray-50/60"><p className="text-xs font-bold text-gray-500 uppercase tracking-wide">Conversations</p></div>
        <div className="flex-1 overflow-y-auto divide-y divide-gray-50">{conversations.map(c=><button key={c.userId} onClick={()=>setActiveConv(c.userId)} className={`w-full flex items-center gap-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left ${activeConv===c.userId?'bg-noor-50':''}`}>
          <Av s={c.av} size="sm" color="gold"/>
          <div className="flex-1 min-w-0"><p className="text-sm font-bold text-gray-700 truncate">{c.userName}</p><p className="text-xs text-gray-400 truncate">{c.messages[c.messages.length-1]?.body||'No messages'}</p></div>
          {c.unread>0&&<span className="w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center font-bold">{c.unread}</span>}
        </button>)}
        {conversations.length===0&&<p className="text-center text-xs text-gray-400 py-8">No conversations yet</p>}
        </div>
      </div>}
      {/* Chat area */}
      <div className="flex-1 flex flex-col min-w-0">
        {activeConvData?<>
          <div className="flex items-center gap-3 px-5 py-4 border-b border-gray-100 bg-gray-50/40 flex-shrink-0">
            <Av s={isAdmin?activeConvData.av:'SA'} size="sm" color={isAdmin?'gold':'violet'}/>
            <div><p className="text-sm font-bold text-gray-800">{isAdmin?activeConvData.userName:'System Admin'}</p><p className="text-xs text-gray-400">{isAdmin?DEMO_ACCOUNTS.find(u=>u.id===activeConvData.userId)?.role||'':'Support Administrator'}</p></div>
          </div>
          <div ref={msgRef} className="flex-1 overflow-y-auto p-5 space-y-3">
            {(isAdmin?activeConvData.messages:conversations[0]?.messages||[]).map(m=>{
              const mine=m.fromId===currentUser.id;
              return <div key={m.id} className={`flex gap-2 ${mine?'flex-row-reverse':''}`}>
                <Av s={mine?currentUser.av:isAdmin?activeConvData.av:'SA'} size="xs" color={mine?'gold':'violet'}/>
                <div className={`max-w-xs lg:max-w-md ${mine?'items-end':'items-start'} flex flex-col gap-1`}>
                  <div className={`px-4 py-2.5 text-sm leading-relaxed ${mine?'msg-bubble-user text-green-900':'msg-bubble-admin text-amber-900'}`}>{m.body}</div>
                  <p className="text-xs text-gray-400 px-1">{new Date(m.at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} · {new Date(m.at).toLocaleDateString()}</p>
                </div>
              </div>;
            })}
            {(isAdmin?activeConvData.messages:conversations[0]?.messages||[]).length===0&&<div className="flex-1 flex items-center justify-center"><p className="text-sm text-gray-400">No messages yet. Send the first message!</p></div>}
          </div>
          <div className="px-4 py-3 border-t border-gray-100 flex gap-3 flex-shrink-0">
            <input value={newMsg} onChange={e=>setNewMsg(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Type a message… (Enter to send)" className="flex-1 px-4 py-2.5 text-sm border border-gray-200 rounded-xl focus:border-noor-400 focus:ring-2 focus:ring-noor-100 outline-none"/>
            <Btn icon={Ic.Send} onClick={send} disabled={!newMsg.trim()}>Send</Btn>
          </div>
        </>:<div className="flex-1 flex items-center justify-center"><div className="text-center text-gray-400"><Ic.Chat/><p className="text-sm mt-3">Select a conversation to start messaging</p></div></div>}
      </div>
    </div>
    <Modal open={showNew} onClose={()=>setShowNew(false)} title="New Message" size="sm">
      <div className="space-y-4">
        <Select label="Send To" value={newConvUser} onChange={setNewConvUser} required placeholder="Select user" options={DEMO_ACCOUNTS.filter(u=>u.id!==currentUser.id&&u.role!=='Admin').map(u=>({v:u.id,l:`${u.name} (${u.role})`}))}/>
        <div className="space-y-1.5"><label className="block text-xs font-bold text-gray-500 uppercase tracking-wide">Message</label><textarea value={newMsg} onChange={e=>setNewMsg(e.target.value)} placeholder="Type your message…" rows={4} className="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-xl focus:border-noor-400 outline-none resize-none"/></div>
        <div className="flex justify-end gap-3 pt-2 border-t border-gray-100"><Btn variant="secondary" onClick={()=>setShowNew(false)}>Cancel</Btn><Btn icon={Ic.Send} onClick={()=>{if(!newConvUser||!newMsg.trim()){toast('Select recipient and type message','error');return;}setMessages(p=>[...p,{id:`m${Date.now()}`,fromId:currentUser.id,fromName:currentUser.name,fromAv:currentUser.av,toId:newConvUser,body:newMsg.trim(),at:new Date().toISOString(),read:false}]);setActiveConv(newConvUser);setNewMsg('');setShowNew(false);toast('Message sent','success');}}>Send</Btn></div>
      </div>
    </Modal>
  </div>;
};

  return <div className="space-y-4 fade">
    <div><h1 className="text-xl font-bold text-gray-900">Master Configuration</h1><p className="text-sm text-gray-500 mt-0.5">Access control, SLA rules, and system configuration</p></div>
    <div className="flex gap-1 bg-white border border-gray-100 rounded-2xl shadow-sm p-1.5 w-fit">{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-all ${tab===t.id?'bg-noor-500 text-white shadow-sm':'text-gray-600 hover:bg-gray-100'}`}><t.I/>{t.l}</button>)}</div>
    {tab==='access'&&<div className="fade space-y-3">
      <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 flex items-center gap-2 text-sm text-amber-800"><Ic.Info/><span>Admin always has full access. Toggle screen access per role below.</span></div>
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead><tr className="bg-gray-50 border-b border-gray-100"><th className="text-left px-4 py-3 text-xs font-bold text-gray-500 uppercase tracking-wide min-w-[160px]">Screen / Feature</th>{roles.map(r=><th key={r} className="px-4 py-3 text-center text-xs font-bold uppercase tracking-wide min-w-[110px]"><span className={`px-2 py-0.5 rounded-full text-xs font-bold ${r==='Admin'?'bg-ink-100 text-ink-700':r==='Supervisor'?'bg-blue-100 text-blue-700':r==='Agent'?'bg-teal-100 text-teal-700':'bg-gray-100 text-gray-600'}`}>{r}</span></th>)}</tr></thead>
            <tbody className="divide-y divide-gray-50">{Object.entries(ALL_SCREENS).map(([id,label])=><tr key={id} className="hover:bg-gray-50/60 transition-colors">
              <td className="px-4 py-3"><p className="text-sm font-semibold text-gray-700">{label}</p><p className="text-xs text-gray-400 font-mono">{id}</p></td>
              {roles.map(role=><td key={role} className="px-4 py-3 text-center">
                {role==='Admin'?<div className="flex justify-center"><span className="w-5 h-5 bg-green-100 text-green-600 rounded-full flex items-center justify-center"><Ic.Check/></span></div>
                :<button onClick={()=>togglePerm(role,id)} className={`w-9 h-5 rounded-full transition-colors mx-auto flex-shrink-0 flex items-center relative ${perms[role]?.[id]?'bg-noor-500':'bg-gray-200'}`}><span className={`absolute w-4 h-4 bg-white rounded-full shadow transition-all ${perms[role]?.[id]?'left-4':'left-0.5'}`}/></button>}
              </td>)}
            </tr>)}</tbody>
          </table>
        </div>
      </div>
      <div className="flex justify-end"><Btn icon={Ic.Save} onClick={()=>toast('Access control saved','success')}>Save Access Rules</Btn></div>
    </div>}
    {tab==='sla'&&<div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden fade">
      <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100"><h3 className="text-sm font-bold text-gray-700">SLA Configuration</h3><Btn size="sm" icon={Ic.Save} onClick={()=>toast('SLA rules saved','success')}>Save</Btn></div>
      <div className="divide-y divide-gray-50">{sla.map((r,i)=><div key={r.p} className="px-5 py-4 flex items-center gap-5"><Bdg v={r.p} type="p"/><div className="flex-1 grid grid-cols-3 gap-4">
        {[['First Response',r.first,'first'],['Resolution',r.res,'res'],['Escalate To',null,'esc',['Agent','Supervisor','Admin']]].map(([lbl,val,key,opts])=><div key={key}><p className="text-xs text-gray-400 font-bold uppercase mb-1.5">{lbl}</p>
          {opts?<select value={r[key]} onChange={e=>setSla(p=>p.map((x,j)=>j===i?{...x,[key]:e.target.value}:x))} className="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:border-noor-400 outline-none bg-white">{opts.map(o=><option key={o} value={o}>{o}</option>)}</select>
          :<input value={r[key]} onChange={e=>setSla(p=>p.map((x,j)=>j===i?{...x,[key]:e.target.value}:x))} className="w-full px-2 py-1.5 text-xs border border-gray-200 rounded-lg focus:border-noor-400 outline-none"/>}
        </div>)}
      </div></div>)}
      </div>
    </div>}
    {tab==='categories'&&<div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 fade">
      <h3 className="text-sm font-bold text-gray-700 mb-4">Ticket Categories</h3>
      <div className="flex gap-3 mb-4"><input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newCat.trim()){setCats(p=>[...p,{name:newCat.trim(),active:true}]);setNewCat('');toast('Category added','success');}}} placeholder="New category name…" className="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-xl focus:border-noor-400 outline-none"/><Btn size="sm" icon={Ic.Plus} onClick={()=>{if(!newCat.trim())return;setCats(p=>[...p,{name:newCat.trim(),active:true}]);setNewCat('');toast('Category added','success');}}>Add</Btn></div>
      <div className="grid grid-cols-2 gap-2">{cats.map((c,i)=><div key={c.name} className={`flex items-center justify-between px-3 py-2.5 rounded-xl border transition-all ${c.active?'bg-white border-gray-200':'bg-gray-50 border-dashed border-gray-200 opacity-60'}`}>
        <span className="text-sm text-gray-700 font-medium">{c.name}</span>
        <div className="flex items-center gap-2"><Toggle value={c.active} onChange={()=>setCats(p=>p.map((x,j)=>j===i?{...x,active:!x.active}:x))}/><button onClick={()=>{setCats(p=>p.filter((_,j)=>j!==i));toast('Category removed','success');}} className="p-1 rounded hover:bg-red-100 text-gray-400 hover:text-red-500"><Ic.Trash/></button></div>
      </div>)}</div>
    </div>}
    {tab==='settings'&&<div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 space-y-4 fade">
      <h3 className="text-sm font-bold text-gray-700">System Settings</h3>
      {[{l:'Maintenance Mode',d:'Disable access for non-admin users',def:false},{l:'Auto-assign tickets by branch',d:'Automatically assign new tickets to available agents',def:true},{l:'SLA breach notifications',d:'Send alerts when tickets breach their SLA deadline',def:true},{l:'Require category on ticket creation',d:'Users must select a category before submitting',def:true},{l:'Allow ticket reopening',d:'Allow users to reopen resolved tickets within 48 hours',def:true}].map(s=>{const [v,setV]=useState(s.def);return <div key={s.l} className="flex items-start justify-between p-4 bg-gray-50 rounded-xl border border-gray-200"><div><p className="text-sm font-semibold text-gray-700">{s.l}</p><p className="text-xs text-gray-400 mt-0.5">{s.d}</p></div><Toggle value={v} onChange={setV}/></div>;})}
      <div className="flex justify-end pt-2 border-t border-gray-100"><Btn icon={Ic.Save} onClick={()=>toast('System settings saved','success')}>Save Settings</Btn></div>
    </div>}
  </div>;
};

/* ══════════════════════════════════════════════
   SETTINGS (Admin)
══════════════════════════════════════════════ */
const SettingsPage=({toast})=>{
  const [tab,setTab]=useState('smtp');
  const [smtp,setSmtp]=useState({host:'smtp.mailgun.org',port:'587',tls:true,username:'postmaster@noor.ae',password:'',senderEmail:'support@noor.ae',senderName:'Noor Ticketing Support'});
  const [sms,setSms]=useState({url:'https://api.twilio.com/2010-04-01/',username:'ACxxxxxxxx',password:'',apiKey:'',senderId:'NOOR'});
  const [saving,setSaving]=useState(false);const [testing,setTesting]=useState(false);const [showPw,setShowPw]=useState(false);
  const save=async()=>{setSaving(true);await new Promise(r=>setTimeout(r,900));setSaving(false);toast(`${tab.toUpperCase()} settings saved & encrypted`,'success');};
  const test=async()=>{setTesting(true);await new Promise(r=>setTimeout(r,1800));setTesting(false);toast(Math.random()>0.3?`${tab==='smtp'?'Test email':'Test SMS'} sent successfully ✓`:'Connection failed — check your credentials','success');};
  const tabs=[{id:'smtp',l:'Email SMTP',I:Ic.Mail},{id:'sms',l:'SMS Gateway',I:Ic.Chat},{id:'security',l:'Security',I:Ic.Shield}];
  return <div className="space-y-4 fade">
    <div><h1 className="text-xl font-bold text-gray-900">Settings</h1><p className="text-sm text-gray-500 mt-0.5">Email, SMS and security configuration</p></div>
    <div className="flex gap-1 bg-white border border-gray-100 rounded-2xl shadow-sm p-1.5 w-fit">{tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold transition-all ${tab===t.id?'bg-noor-500 text-white':'text-gray-600 hover:bg-gray-100'}`}><t.I/>{t.l}</button>)}</div>
    {tab==='smtp'&&<div className="bg-white rounded-2xl border border-gray-100 shadow-sm fade">
      <div className="px-6 py-4 border-b border-gray-100 flex items-center gap-3"><div className="w-9 h-9 rounded-xl bg-blue-50 flex items-center justify-center text-blue-500"><Ic.Mail/></div><div><p className="text-sm font-bold text-gray-800">SMTP Email Configuration</p><p className="text-xs text-gray-400">Credentials encrypted with AES-256-GCM</p></div><span className="ml-auto flex items-center gap-1 text-xs text-green-700 bg-green-50 border border-green-200 px-2 py-1 rounded-lg font-semibold"><Ic.Lock/>Encrypted</span></div>
      <div className="p-6 space-y-5">
        <div className="grid grid-cols-3 gap-4"><div className="col-span-2"><Input label="SMTP Host" value={smtp.host} onChange={v=>setSmtp(p=>({...p,host:v}))} required placeholder="smtp.mailgun.org"/></div><Input label="Port" value={smtp.port} onChange={v=>setSmtp(p=>({...p,port:v}))} placeholder="587"/></div>
        <div className="flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-200"><div><p className="text-sm font-semibold text-gray-700">Enable TLS / STARTTLS</p><p className="text-xs text-gray-400 mt-0.5">Required for most providers</p></div><Toggle value={smtp.tls} onChange={v=>setSmtp(p=>({...p,tls:v}))}/></div>
        <div className="grid grid-cols-2 gap-4"><Input label="Username" value={smtp.username} onChange={v=>setSmtp(p=>({...p,username:v}))} icon={Ic.Person}/>
          <div className="space-y-1.5"><label className="block text-xs font-bold text-gray-500 uppercase tracking-wide">Password</label><div className="relative"><div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Ic.Lock/></div><input type={showPw?'text':'password'} value={smtp.password} onChange={e=>setSmtp(p=>({...p,password:e.target.value}))} placeholder="SMTP password" className="w-full pl-9 pr-10 py-2.5 text-sm border border-gray-200 rounded-xl focus:border-noor-400 outline-none"/><button onClick={()=>setShowPw(!showPw)} className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400">{showPw?<Ic.EyeOff/>:<Ic.Eye/>}</button></div></div>
        </div>
        <div className="grid grid-cols-2 gap-4"><Input label="Sender Email" value={smtp.senderEmail} onChange={v=>setSmtp(p=>({...p,senderEmail:v}))} icon={Ic.Mail}/><Input label="Sender Name" value={smtp.senderName} onChange={v=>setSmtp(p=>({...p,senderName:v}))}/></div>
        <div className="flex items-center justify-between pt-2 border-t border-gray-100"><Btn variant="outline" icon={Ic.Activity} onClick={test} loading={testing}>Test Connection</Btn><Btn icon={Ic.Save} onClick={save} loading={saving}>Save Settings</Btn></div>
      </div>
    </div>}
    {tab==='sms'&&<div className="bg-white rounded-2xl border border-gray-100 shadow-sm fade">
      <div className="px-6 py-4 border-b border-gray-100 flex items-center gap-3"><div className="w-9 h-9 rounded-xl bg-green-50 flex items-center justify-center text-green-600"><Ic.Chat/></div><div><p className="text-sm font-bold text-gray-800">SMS Gateway Configuration</p><p className="text-xs text-gray-400">Supports Twilio, Unifonic, and custom REST</p></div></div>
      <div className="p-6 space-y-5">
        <Input label="Provider API URL" value={sms.url} onChange={v=>setSms(p=>({...p,url:v}))} required/>
        <div className="grid grid-cols-2 gap-4"><Input label="Account SID / Username" value={sms.username} onChange={v=>setSms(p=>({...p,username:v}))}/><div className="space-y-1.5"><label className="block text-xs font-bold text-gray-500 uppercase tracking-wide">Auth Token</label><div className="relative"><div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><Ic.Lock/></div><input type="password" value={sms.password} onChange={e=>setSms(p=>({...p,password:e.target.value}))} className="w-full pl-9 pr-3 py-2.5 text-sm border border-gray-200 rounded-xl focus:border-noor-400 outline-none"/></div></div></div>
        <div className="grid grid-cols-2 gap-4"><Input label="Sender ID (max 11 chars)" value={sms.senderId} onChange={v=>setSms(p=>({...p,senderId:v}))} placeholder="NOOR"/><Input label="API Key" value={sms.apiKey} onChange={v=>setSms(p=>({...p,apiKey:v}))}/></div>
        <div className="flex items-center justify-between pt-2 border-t border-gray-100"><Btn variant="outline" icon={Ic.Activity} onClick={test} loading={testing}>Send Test SMS</Btn><Btn icon={Ic.Save} onClick={save} loading={saving}>Save Settings</Btn></div>
      </div>
    </div>}
    {tab==='security'&&<div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 space-y-4 fade">
      <h3 className="text-sm font-bold text-gray-700">Security Settings</h3>
      {[['Two-Factor Authentication (2FA)','Require for all admin accounts',true],['Session timeout (30 min)','Auto-logout on inactivity',true],['Login rate limiting','Max 5 attempts per 15 minutes',true],['Audit logging','Log all configuration changes',true],['Force HTTPS','Redirect all HTTP to HTTPS',true]].map(([l,d,def])=>{const [v,setV]=useState(def);return <div key={l} className="flex items-start justify-between p-4 bg-gray-50 rounded-xl border border-gray-200"><div><p className="text-sm font-semibold text-gray-700">{l}</p><p className="text-xs text-gray-400 mt-0.5">{d}</p></div><Toggle value={v} onChange={setV}/></div>;})}
      <div className="flex justify-end pt-2 border-t border-gray-100"><Btn icon={Ic.Save} onClick={()=>toast('Security settings saved','success')}>Save</Btn></div>
    </div>}
  </div>;
};

/* ══════════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════════ */
function App(){
  const [currentUser,setCurrentUser]=useState(null);
  const [page,setPage]=useState(null);
  const [selTicket,setSelTicket]=useState(null);
  const [collapsed,setCollapsed]=useState(false);
  const [toast,setToast]=useState(null);
  const [tickets]=useState(()=>mkTickets());

  const showToast=(msg,type='success')=>setToast({msg,type});

  const handleLogin=(user)=>{
    setCurrentUser(user);
    setPage(user.role==='End-User'?'my_tickets':'dashboard');
  };
  const handleLogout=()=>{setCurrentUser(null);setPage(null);setSelTicket(null);};

  if(!currentUser)return<><LoginPage onLogin={handleLogin}/>{toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}</>;

  const ml=collapsed?'ml-16':'ml-60';

  // Counts for badge
  const unreadMsgs=mkMessages().filter(m=>m.toId===currentUser.id&&!m.read).length;
  const newTickets=tickets.filter(t=>t.status==='NEW').length;
  const counts={tickets:newTickets,messages:unreadMsgs};

  const renderPage=()=>{
    switch(page){
      case 'dashboard':     return <Dashboard tickets={tickets} setPage={setPage} setSelT={setSelTicket}/>;
      case 'tickets':
      case 'my_tickets':    return <TicketList tickets={tickets} setPage={setPage} setSelT={setSelTicket} currentUser={currentUser}/>;
      case 'ticket_detail': return <TicketDetail ticket={selTicket} currentUser={currentUser} setPage={setPage} toast={showToast}/>;
      case 'create_ticket': return <CreateTicket currentUser={currentUser} setPage={setPage} toast={showToast}/>;
      case 'assets':
      case 'my_assets':     return <Assets currentUser={currentUser} toast={showToast}/>;
      case 'users':         return <UsersPage toast={showToast}/>;
      case 'branches':      return <BranchesPage toast={showToast}/>;
      case 'reports':       return <Reports tickets={tickets}/>;
      case 'messages':      return <Messages currentUser={currentUser} toast={showToast}/>;
      case 'settings':      return <SettingsPage toast={showToast}/>;
      case 'master':        return <MasterConfig toast={showToast}/>;
      default:              return <Dashboard tickets={tickets} setPage={setPage} setSelT={setSelTicket}/>;
    }
  };

  return <div className="min-h-screen bg-gray-50">
    <Sidebar user={currentUser} page={page} setPage={setPage} collapsed={collapsed} setCollapsed={setCollapsed} counts={counts} onLogout={handleLogout}/>
    <div className={`${ml} transition-all duration-300 min-h-screen flex flex-col`}>
      {/* Header */}
      <header className="sticky top-0 z-30 bg-white/90 backdrop-blur-sm border-b border-gray-100 px-6 py-3 flex items-center justify-between flex-shrink-0">
        <div className="flex items-center gap-2 text-sm text-gray-500">
          <span className="font-bold text-noor-600">Noor</span>
          <Ic.ChevR/>
          <span className="font-semibold text-gray-700">{page==='my_tickets'?'My Tickets':page==='my_assets'?'My Assets':page==='ticket_detail'&&selTicket?selTicket.id:(page||'').replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</span>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={()=>setPage('messages')} className="relative p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
            <Ic.Chat/>{unreadMsgs>0&&<span className="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 text-white text-[9px] flex items-center justify-center rounded-full font-bold">{unreadMsgs}</span>}
          </button>
          <div className="flex items-center gap-2 pl-3 border-l border-gray-200">
            <Av s={currentUser.av} size="sm" color={currentUser.role==='Admin'?'violet':'gold'}/>
            <div className="hidden sm:block"><p className="text-xs font-bold text-gray-700">{currentUser.name}</p><p className="text-xs text-gray-400">{currentUser.role}{currentUser.empId?` · ${currentUser.empId}`:''}</p></div>
          </div>
        </div>
      </header>
      <main className="flex-1 p-6">{renderPage()}</main>
    </div>
    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
